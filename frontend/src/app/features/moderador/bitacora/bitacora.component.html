<!-- Header -->
<div class="mb-6">
  <h1 class="font-display text-2xl text-text-primary">Bitácora de Auditoría</h1>
  <p class="text-sm font-body text-text-secondary mt-1">{{ competenciaNombre() }}</p>
</div>

@if (loading()) {
  <div class="flex items-center justify-center h-40">
    <span class="text-text-secondary font-body text-sm">Cargando bitácora...</span>
  </div>
} @else if (entradas().length) {
  <!-- Timeline -->
  <div class="sim-card">
    <div class="flex flex-col">
      @for (e of entradas(); track $index) {
        <div class="flex gap-4" [class.pb-4]="!$last">
          <!-- Timeline line -->
          <div class="flex flex-col items-center">
            <div class="w-8 h-8 rounded-full bg-surface-card border border-border flex items-center justify-center shrink-0">
              <lucide-icon [img]="e.icono" [size]="14" class="text-text-icon"></lucide-icon>
            </div>
            @if (!$last) {
              <div class="w-px flex-1 bg-border mt-1"></div>
            }
          </div>
          <!-- Content -->
          <div class="pb-4 min-w-0">
            <p class="font-body text-sm text-text-primary">{{ e.accion }}</p>
            <span class="font-body text-xs text-text-secondary">{{ e.fecha | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
        </div>
      }
    </div>
  </div>
} @else {
  <div class="sim-card flex items-center justify-center h-32">
    <span class="text-text-secondary font-body text-sm">No hay entradas en la bitácora</span>
  </div>
}
