version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: simulador
      POSTGRES_USER: simulador
      POSTGRES_PASSWORD: ${DB_PASSWORD:-simulador_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simulador"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_FLYWAY_ENABLED: "true"
      DB_URL: jdbc:postgresql://db:5432/simulador
      DB_USERNAME: simulador
      DB_PASSWORD: ${DB_PASSWORD:-simulador_dev}
      JWT_SECRET: ${JWT_SECRET:?Debes definir JWT_SECRET en .env}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      LLM_PROVIDER: ${LLM_PROVIDER:-template}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "127.0.0.1:8080:8080"

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        API_BASE_URL: ${API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  pgdata:
